<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sr. Doggy — Contabilidad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f2ecce; min-height: 100vh; }
  
  /* Header */
  .header { background: linear-gradient(135deg, #2d5016 0%, #3a5f1c 50%, #4a7c2e 100%); padding: 24px 28px 20px; border-bottom: 3px solid #d4a017; }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .header-logo { width: 44px; height: 44px; border-radius: 12px; background: #d4a017; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 2px 8px #00000033; }
  .header h1 { color: #f5e6a3; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .header p { color: #b8c9a0; font-size: 12px; font-weight: 500; margin-top: 2px; }
  
  /* Month Nav */
  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; background: #ffffff11; border-radius: 10px; padding: 8px 0; }
  .month-nav button { background: none; border: none; color: #f5e6a3; font-size: 22px; cursor: pointer; padding: 4px 14px; transition: transform .15s; }
  .month-nav button:hover { transform: scale(1.2); }
  .month-nav span { color: #f5e6a3; font-size: 16px; font-weight: 700; min-width: 180px; text-align: center; }
  
  /* Tabs */
  .tabs { display: flex; gap: 4px; padding: 12px 20px; overflow-x: auto; background: #eae4c4; border-bottom: 1px solid #d4c98a; }
  .tabs::-webkit-scrollbar { height: 0; }
  .tab-btn { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border: none; border-radius: 10px; background: transparent; color: #6b7c5e; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .tab-btn.active { background: #2d5016; color: #f5e6a3; }
  .tab-btn:hover:not(.active) { background: #ddd8b8; }
  .tab-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  
  /* Content */
  .content { padding: 20px; max-width: 960px; margin: 0 auto; }
  .section-title { font-size: 16px; font-weight: 700; color: #2d3a1e; margin-bottom: 14px; }
  
  /* Inputs */
  .cop-input, .text-input, .select-input {
    padding: 8px 10px; border: 1px solid #d4c98a; border-radius: 6px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: #fefdf5; color: #2d3a1e; outline: none; width: 100%;
  }
  .cop-input { font-family: 'JetBrains Mono', monospace; text-align: right; }
  .cop-input:focus, .text-input:focus, .select-input:focus { border-color: #4a7c2e; box-shadow: 0 0 0 2px #4a7c2e22; }
  .select-input { cursor: pointer; }
  
  /* Buttons */
  .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: #3a5f1c; color: #f5e6a3; border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; transition: background .2s; }
  .btn-primary:hover { background: #2d5016; }
  .btn-delete { width: 30px; height: 30px; border: none; border-radius: 6px; background: #f5d5d5; color: #8b1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0; }
  .btn-delete:hover { background: #e8b8b8; }
  
  /* Cards */
  .summary-card { border-radius: 12px; padding: 18px 20px; }
  .summary-card .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: .7; }
  .summary-card .value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; margin-top: 6px; }
  
  /* Grid table */
  .ventas-grid { display: grid; grid-template-columns: 60px 1fr 1fr 1fr 90px; gap: 1px; background: #c9bf8a; border-radius: 12px; overflow: hidden; border: 2px solid #c9bf8a; }
  .ventas-grid .gh { padding: 10px 8px; background: #3a5f1c; color: #f5e6a3; font-size: 12px; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
  .ventas-grid .gc { padding: 3px; display: flex; align-items: center; justify-content: center; }
  .ventas-grid .gc.day-cell { flex-direction: column; font-size: 14px; font-weight: 700; color: #2d3a1e; padding: 6px 8px; }
  .ventas-grid .gc.day-cell .dn { font-size: 9px; color: #8a9670; text-transform: uppercase; }
  .ventas-grid .gc input { width: 100%; }
  
  /* Row items */
  .row-item { display: flex; gap: 8px; align-items: center; padding: 10px 12px; background: #fefdf5; border-radius: 10px; border: 1px solid #e5ddb5; margin-bottom: 8px; flex-wrap: wrap; }
  .row-item .field { flex: 1; min-width: 100px; }
  .row-item .field-sm { width: 70px; flex-shrink: 0; }
  .row-item .field-md { width: 140px; flex-shrink: 0; }
  
  /* Fijo item */
  .fijo-item { display: flex; gap: 12px; align-items: center; padding: 14px 16px; background: #fefdf5; border-radius: 10px; border: 1px solid #e5ddb5; margin-bottom: 10px; }
  .fijo-item .name-input { flex: 1; font-weight: 600; font-size: 14px; }
  .fijo-item .val-input { width: 180px; }
  
  /* Total bars */
  .total-bar { border-radius: 10px; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .total-bar .tl { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .total-bar .tv { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
  
  /* Totals row */
  .totals-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 16px; }
  .total-card { border-radius: 10px; padding: 14px 16px; text-align: center; color: #f5e6a3; }
  .total-card .tc-label { font-size: 11px; opacity: .8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .total-card .tc-val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; margin-top: 4px; }
  
  /* Summary grid */
  .sum-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .sum-grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .sum-section-label { font-size: 12px; color: #6b7c5e; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
  
  .utilidad-bar { border-radius: 14px; padding: 24px 28px; display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .utilidad-bar .u-label { font-size: 12px; color: #ffffff99; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
  .utilidad-bar .u-val { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; color: #fff; margin-top: 6px; }
  .utilidad-bar .u-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #ffffff22; font-size: 28px; }
  
  .detail-row { display: flex; justify-content: space-between; padding: 10px 14px; background: #fefdf5; border-radius: 8px; border: 1px solid #e5ddb5; margin-bottom: 6px; }
  .detail-row .dr-name { font-size: 13px; color: #2d3a1e; font-weight: 500; }
  .detail-row .dr-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
  
  .empty-state { text-align: center; padding: 40px; color: #8a9670; font-size: 14px; background: #f5f0d8; border-radius: 12px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .caja-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }

  @media (max-width: 700px) {
    .ventas-grid { grid-template-columns: 50px 1fr 1fr 80px; }
    .ventas-grid .gh:nth-child(4), .ventas-grid .gc.notes-cell { display: none; }
    .totals-row { grid-template-columns: 1fr; }
    .sum-grid3, .sum-grid4 { grid-template-columns: 1fr 1fr; }
    .caja-grid { grid-template-columns: 1fr; }
    .tabs { gap: 2px; padding: 10px 12px; }
    .tab-btn { padding: 8px 12px; font-size: 12px; }
    .tab-btn .tab-text { display: none; }
    .content { padding: 14px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="header-logo">🌭</div>
    <div>
      <h1>Sr. Doggy</h1>
      <p>Contabilidad & Control</p>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="prevMonth()">‹</button>
    <span id="monthLabel"></span>
    <button onclick="nextMonth()">›</button>
  </div>
  <div style="text-align:center;margin-top:8px;font-size:11px;font-weight:600">
    <span id="sync-indicator" style="color:#b8c9a0">↻ Cargando...</span>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('ventas', this)">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    <span class="tab-text">Ventas Diarias</span>
  </button>
  <button class="tab-btn" onclick="switchTab('gastos', this)">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    <span class="tab-text">Gastos</span>
  </button>
  <button class="tab-btn" onclick="switchTab('mercancia', this)">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>
    <span class="tab-text">Mercancía</span>
  </button>
  <button class="tab-btn" onclick="switchTab('fijos', this)">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span class="tab-text">Gastos Fijos</span>
  </button>
  <button class="tab-btn" onclick="switchTab('caja', this)">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><path d="M16 14h2v4h-2a2 2 0 010-4z"/></svg>
    <span class="tab-text">Caja</span>
  </button>
  <button class="tab-btn" onclick="switchTab('resumen', this)">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    <span class="tab-text">Resumen</span>
  </button>
</div>

<!-- Content -->
<div class="content">
  <div id="tab-ventas" class="tab-panel active"></div>
  <div id="tab-gastos" class="tab-panel"></div>
  <div id="tab-mercancia" class="tab-panel"></div>
  <div id="tab-fijos" class="tab-panel"></div>
  <div id="tab-caja" class="tab-panel"></div>
  <div id="tab-resumen" class="tab-panel"></div>
</div>

<script>
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES = ["dom","lun","mar","mié","jue","vie","sáb"];
const STORAGE_KEY = "sr_doggy_contabilidad";
const DEFAULT_FIXED = [
  { id: "emp", name: "Empleado", value: 0, fecha: "", metodo: "efectivo" },
  { id: "luz", name: "Luz", value: 0, fecha: "", metodo: "efectivo" },
  { id: "agua", name: "Agua", value: 0, fecha: "", metodo: "efectivo" },
  { id: "internet", name: "Internet", value: 0, fecha: "", metodo: "bancolombia" },
  { id: "arriendo", name: "Arriendo", value: 0, fecha: "", metodo: "efectivo" },
];

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let currentTab = "ventas";
const API_URL = "";
let data = { ventas: {}, gastos: {}, mercancia: {}, fijos: {} };
let syncStatus = "cargando";

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  fetch(API_URL + "/data", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) })
    .then(r => r.ok ? setSyncStatus("ok") : setSyncStatus("error"))
    .catch(() => setSyncStatus("offline"));
}

function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById("sync-indicator");
  if (!el) return;
  const map = { ok: ["✓ Sincronizado", "#4a7c2e"], offline: ["⚠ Sin conexión (guardado local)", "#b8860b"], error: ["✗ Error de sync", "#8b1a1a"], cargando: ["↻ Cargando...", "#555"] };
  const [txt, color] = map[s] || map.cargando;
  el.textContent = txt; el.style.color = color;
}

async function initData() {
  const local = loadData();
  if (local) { data = local; renderVentas(); }
  try {
    const res = await fetch(API_URL + "/data");
    if (res.ok) {
      const remote = await res.json();
      if (Object.keys(remote).length > 0) {
        data = remote;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } else if (local) {
        saveData();
      }
      setSyncStatus("ok");
    } else { setSyncStatus("offline"); }
  } catch { setSyncStatus("offline"); }
  renderVentas();
}
function fmt(n) {
  const num = parseInt(n) || 0;
  return "$" + num.toLocaleString("es-CO");
}
function fmtFecha(fecha) {
  if (!fecha) return "—";
  if (typeof fecha === "number") return `Día ${fecha}`;
  const p = fecha.split("-");
  return `${p[2]}/${p[1]}/${p[0]}`;
}
function daysInMonth(m, y) { return new Date(y, m + 1, 0).getDate(); }
function getKey() { return `${currentYear}-${currentMonth}`; }

function updateMonthLabel() {
  document.getElementById("monthLabel").textContent = `${MONTHS[currentMonth]} ${currentYear}`;
}
function prevMonth() {
  if (currentMonth === 0) { currentMonth = 11; currentYear--; } else currentMonth--;
  updateMonthLabel(); renderCurrentTab();
}
function nextMonth() {
  if (currentMonth === 11) { currentMonth = 0; currentYear++; } else currentMonth++;
  updateMonthLabel(); renderCurrentTab();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCurrentTab();
}

function renderCurrentTab() {
  switch(currentTab) {
    case "ventas": renderVentas(); break;
    case "gastos": renderGastos(); break;
    case "mercancia": renderMercancia(); break;
    case "fijos": renderFijos(); break;
    case "caja": renderCaja(); break;
    case "resumen": renderResumen(); break;
  }
}

// ============ VENTAS ============
function renderVentas() {
  const key = getKey();
  const days = daysInMonth(currentMonth, currentYear);
  if (!data.ventas) data.ventas = {};
  if (!data.ventas[key]) data.ventas[key] = {};
  const v = data.ventas[key];
  
  let html = '<div class="ventas-grid">';
  html += '<div class="gh">Día</div><div class="gh">Efectivo</div><div class="gh">Bancolombia</div><div class="gh">Notas</div><div class="gh">Total</div>';
  
  for (let d = 1; d <= days; d++) {
    if (!v[d]) v[d] = { efectivo: 0, bancolombia: 0, notas: "" };
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dayName = DAYS_ES[dow];
    const bg = (dow === 0 || dow === 6) ? "#f0ead0" : "#fefdf5";
    
    html += `<div class="gc day-cell" style="background:${bg}">${d}<span class="dn">${dayName}</span></div>`;
    html += `<div class="gc" style="background:${bg}"><input class="cop-input" value="${fmt(v[d].efectivo)}" onfocus="this.value='${v[d].efectivo||''}';this.select()" onblur="updateVenta(${d},'efectivo',this.value)"></div>`;
    html += `<div class="gc" style="background:${bg}"><input class="cop-input" value="${fmt(v[d].bancolombia)}" onfocus="this.value='${v[d].bancolombia||''}';this.select()" onblur="updateVenta(${d},'bancolombia',this.value)"></div>`;
    html += `<div class="gc notes-cell" style="background:${bg}"><input class="text-input" value="${v[d].notas||''}" placeholder="..." onchange="updateVenta(${d},'notas',this.value)" style="background:transparent"></div>`;
    const dayTotal = (v[d].efectivo || 0) + (v[d].bancolombia || 0);
    html += `<div class="gc" style="background:${dayTotal > 0 ? '#e8f2dc' : bg};font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${dayTotal > 0 ? '#2d5016' : '#bbb'};justify-content:center">${dayTotal > 0 ? fmt(dayTotal) : '—'}</div>`;
  }
  html += '</div>';
  
  let totE = 0, totB = 0;
  for (let d = 1; d <= days; d++) {
    totE += (v[d]?.efectivo || 0);
    totB += (v[d]?.bancolombia || 0);
  }
  
  html += '<div class="totals-row">';
  html += `<div class="total-card" style="background:#4a7c2e"><div class="tc-label">Total Efectivo</div><div class="tc-val">${fmt(totE)}</div></div>`;
  html += `<div class="total-card" style="background:#1a5276"><div class="tc-label">Total Bancolombia</div><div class="tc-val">${fmt(totB)}</div></div>`;
  html += `<div class="total-card" style="background:#2d5016"><div class="tc-label">Total Ventas</div><div class="tc-val">${fmt(totE + totB)}</div></div>`;
  html += '</div>';
  
  document.getElementById("tab-ventas").innerHTML = html;
}

function updateVenta(day, field, val) {
  const key = getKey();
  if (!data.ventas[key]) data.ventas[key] = {};
  if (!data.ventas[key][day]) data.ventas[key][day] = { efectivo: 0, bancolombia: 0, notas: "" };
  data.ventas[key][day][field] = field === "notas" ? val : (parseInt(val.replace(/[^0-9-]/g,"")) || 0);
  saveData();
  renderVentas();
}

// ============ GASTOS ============
function renderGastos() {
  const key = getKey();
  if (!data.gastos) data.gastos = {};
  if (!data.gastos[key]) data.gastos[key] = [];
  const g = data.gastos[key];

  let html = '<div class="section-header"><h3 class="section-title">Gastos del Mes</h3>';
  html += '<button class="btn-primary" onclick="addGasto()">+ Agregar Gasto</button></div>';
  
  if (g.length === 0) {
    html += '<div class="empty-state">No hay gastos registrados este mes</div>';
  } else {
    g.forEach((item, i) => {
      html += `<div class="row-item">
        <div style="width:140px;flex-shrink:0"><input type="date" class="text-input" value="${item.fecha||''}" onchange="updateGasto(${i},'fecha',this.value)"></div>
        <div class="field"><input class="text-input" value="${item.descripcion||''}" placeholder="Descripción del gasto" onchange="updateGasto(${i},'descripcion',this.value)"></div>
        <div class="field-md"><input class="cop-input" value="${fmt(item.valor)}" onfocus="this.value='${item.valor||''}';this.select()" onblur="updateGasto(${i},'valor',this.value)"></div>
        <div class="field-md"><select class="select-input" onchange="updateGasto(${i},'metodo',this.value)">
          <option value="efectivo" ${item.metodo=="efectivo"?"selected":""}>Efectivo</option>
          <option value="bancolombia" ${item.metodo=="bancolombia"?"selected":""}>Bancolombia</option>
        </select></div>
        <button class="btn-delete" onclick="removeGasto(${i})">✕</button>
      </div>`;
    });
  }
  
  const totEfG = g.reduce((s, x) => s + ((x.metodo||'efectivo') !== "bancolombia" ? (x.valor || 0) : 0), 0);
  const totBaG = g.reduce((s, x) => s + (x.metodo === "bancolombia" ? (x.valor || 0) : 0), 0);
  const total = totEfG + totBaG;
  html += `<div style="display:flex;gap:8px;margin-top:16px">
    <div style="flex:1;min-width:0;background:#3a6b28;border-radius:10px;padding:12px 8px;text-align:center;overflow:hidden">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#c8e6b0">Efectivo</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#e8f5e0;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmt(totEfG)}</div>
    </div>
    <div style="flex:1;min-width:0;background:#154360;border-radius:10px;padding:12px 8px;text-align:center;overflow:hidden">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#aed6f1">Bancolombia</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#d6eaf8;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmt(totBaG)}</div>
    </div>
  </div>`;
  html += `<div class="total-bar" style="background:#8b1a1a;color:#fce4e4">
    <span class="tl">Total Gastos</span><span class="tv">${fmt(total)}</span>
  </div>`;

  document.getElementById("tab-gastos").innerHTML = html;
}

function addGasto() {
  const key = getKey();
  if (!data.gastos[key]) data.gastos[key] = [];
  data.gastos[key].push({ id: Date.now(), fecha: new Date().toISOString().split('T')[0], descripcion: "", valor: 0, metodo: "efectivo" });
  saveData(); renderGastos();
}
function updateGasto(i, field, val) {
  const key = getKey();
  if (field === "valor") val = parseInt(val.replace(/[^0-9-]/g,"")) || 0;
  data.gastos[key][i][field] = val;
  saveData(); renderGastos();
}
function removeGasto(i) {
  const key = getKey();
  data.gastos[key].splice(i, 1);
  saveData(); renderGastos();
}

// ============ MERCANCÍA ============
function renderMercancia() {
  const key = getKey();
  if (!data.mercancia) data.mercancia = {};
  if (!data.mercancia[key]) data.mercancia[key] = [];
  const m = data.mercancia[key];

  let html = '<div class="section-header"><h3 class="section-title">Compras de Mercancía</h3>';
  html += '<button class="btn-primary" onclick="addMercancia()">+ Agregar Compra</button></div>';

  if (m.length === 0) {
    html += '<div class="empty-state">No hay compras registradas este mes</div>';
  } else {
    [...m].reverse().forEach((item, ri) => {
      const i = m.length - 1 - ri;
      html += `<div style="background:#fefdf5;border-radius:10px;border:1px solid #e5ddb5;padding:10px 12px;margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <input class="text-input" style="flex:1;min-width:0;font-weight:600" value="${item.producto||''}" placeholder="Producto" onchange="updateMercancia(${i},'producto',this.value)">
          <div style="width:108px;flex-shrink:0"><input class="cop-input" value="${fmt(item.costo)}" placeholder="Costo" onfocus="this.value='${item.costo||''}';this.select()" onblur="updateMercancia(${i},'costo',this.value)"></div>
          <button class="btn-delete" onclick="removeMercancia(${i})">✕</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <div style="width:118px;flex-shrink:0"><input type="date" class="text-input" value="${item.fecha||''}" onchange="updateMercancia(${i},'fecha',this.value)"></div>
          <div style="flex:1;min-width:0"><select class="select-input" onchange="updateMercancia(${i},'metodo',this.value)">
            <option value="efectivo" ${(item.metodo||'efectivo')!="bancolombia"?"selected":""}>Efectivo</option>
            <option value="bancolombia" ${item.metodo=="bancolombia"?"selected":""}>Bancolombia</option>
          </select></div>
          <div style="width:52px;flex-shrink:0"><input class="cop-input" value="${item.cantidad||1}" style="text-align:center" placeholder="#" onchange="updateMercancia(${i},'cantidad',this.value)"></div>
        </div>
        <input class="text-input" style="width:100%" value="${item.proveedor||''}" placeholder="Proveedor (opcional)" onchange="updateMercancia(${i},'proveedor',this.value)">
      </div>`;
    });
  }

  const totEfM = m.reduce((s, x) => s + ((x.metodo||'efectivo') !== "bancolombia" ? (x.costo || 0) : 0), 0);
  const totBaM = m.reduce((s, x) => s + (x.metodo === "bancolombia" ? (x.costo || 0) : 0), 0);
  const total = totEfM + totBaM;
  html += `<div style="display:flex;gap:8px;margin-top:16px">
    <div style="flex:1;min-width:0;background:#3a6b28;border-radius:10px;padding:12px 8px;text-align:center;overflow:hidden">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#c8e6b0">Efectivo</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#e8f5e0;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmt(totEfM)}</div>
    </div>
    <div style="flex:1;min-width:0;background:#154360;border-radius:10px;padding:12px 8px;text-align:center;overflow:hidden">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#aed6f1">Bancolombia</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#d6eaf8;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmt(totBaM)}</div>
    </div>
  </div>`;
  html += `<div class="total-bar" style="background:#7a4f0e;color:#fce8c4">
    <span class="tl">Total Mercancía</span><span class="tv">${fmt(total)}</span>
  </div>`;

  document.getElementById("tab-mercancia").innerHTML = html;
}

function addMercancia() {
  const key = getKey();
  if (!data.mercancia[key]) data.mercancia[key] = [];
  data.mercancia[key].push({ id: Date.now(), fecha: new Date().toISOString().split('T')[0], producto: "", cantidad: 1, costo: 0, proveedor: "", metodo: "efectivo" });
  saveData(); renderMercancia();
}
function updateMercancia(i, field, val) {
  const key = getKey();
  if (field === "costo" || field === "cantidad") val = parseInt(val.replace(/[^0-9-]/g,"")) || 0;
  data.mercancia[key][i][field] = val;
  saveData(); renderMercancia();
}
function removeMercancia(i) {
  const key = getKey();
  data.mercancia[key].splice(i, 1);
  saveData(); renderMercancia();
}

// ============ GASTOS FIJOS ============
function renderFijos() {
  const key = getKey();
  if (!data.fijos) data.fijos = {};
  if (!data.fijos[key]) data.fijos[key] = DEFAULT_FIXED.map(f => ({...f}));
  const f = data.fijos[key];
  
  let html = '<div class="section-header"><h3 class="section-title">Gastos Fijos Mensuales</h3>';
  html += '<button class="btn-primary" onclick="addFijo()">+ Agregar Gasto Fijo</button></div>';
  
  f.forEach((item, i) => {
    html += `<div style="background:#fefdf5;border-radius:10px;border:1px solid #e5ddb5;padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <input class="text-input" style="flex:1;min-width:0;font-weight:600" value="${item.name}" placeholder="Nombre" onchange="updateFijo(${i},'name',this.value)">
        <div style="width:120px;flex-shrink:0"><input class="cop-input" value="${fmt(item.value)}" onfocus="this.value='${item.value||''}';this.select()" onblur="updateFijo(${i},'value',this.value)"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="width:118px;flex-shrink:0"><input type="date" class="text-input" value="${item.fecha||''}" onchange="updateFijo(${i},'fecha',this.value)"></div>
        <div style="flex:1;min-width:0"><select class="select-input" onchange="updateFijo(${i},'metodo',this.value)">
          <option value="efectivo" ${(item.metodo||'efectivo')!="bancolombia"?"selected":""}>Efectivo</option>
          <option value="bancolombia" ${item.metodo=="bancolombia"?"selected":""}>Bancolombia</option>
        </select></div>
        <button class="btn-delete" onclick="removeFijo(${i})">✕</button>
      </div>
    </div>`;
  });

  const totEfF = f.reduce((s, x) => s + ((x.metodo||'efectivo') !== "bancolombia" ? (x.value || 0) : 0), 0);
  const totBaF = f.reduce((s, x) => s + (x.metodo === "bancolombia" ? (x.value || 0) : 0), 0);
  const total = totEfF + totBaF;
  html += `<div style="display:flex;gap:8px;margin-top:16px">
    <div style="flex:1;min-width:0;background:#3a6b28;border-radius:10px;padding:12px 8px;text-align:center;overflow:hidden">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#c8e6b0">Efectivo</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#e8f5e0;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmt(totEfF)}</div>
    </div>
    <div style="flex:1;min-width:0;background:#154360;border-radius:10px;padding:12px 8px;text-align:center;overflow:hidden">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#aed6f1">Bancolombia</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#d6eaf8;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmt(totBaF)}</div>
    </div>
  </div>`;
  html += `<div class="total-bar" style="background:#5c1a6e;color:#f0d9f7">
    <span class="tl">Total Fijos</span><span class="tv">${fmt(total)}</span>
  </div>`;
  
  document.getElementById("tab-fijos").innerHTML = html;
}

function addFijo() {
  const key = getKey();
  if (!data.fijos[key]) data.fijos[key] = DEFAULT_FIXED.map(f => ({...f}));
  data.fijos[key].push({ id: "c_" + Date.now(), name: "Nuevo gasto", value: 0, fecha: new Date().toISOString().split('T')[0], metodo: "efectivo" });
  saveData(); renderFijos();
}
function updateFijo(i, field, val) {
  const key = getKey();
  if (field === "value") val = parseInt(val.replace(/[^0-9-]/g,"")) || 0;
  data.fijos[key][i][field] = val;
  saveData(); renderFijos();
}
function removeFijo(i) {
  const key = getKey();
  data.fijos[key].splice(i, 1);
  saveData(); renderFijos();
}

// ============ CAJA ============
function renderCaja() {
  const key = getKey();
  const days = daysInMonth(currentMonth, currentYear);
  const v = data.ventas?.[key] || {};
  const g = data.gastos?.[key] || [];
  const m = data.mercancia?.[key] || [];
  const f = data.fijos?.[key] || DEFAULT_FIXED;

  let ventasEf = 0, ventasBa = 0;
  for (let d = 1; d <= days; d++) {
    ventasEf += (v[d]?.efectivo || 0);
    ventasBa += (v[d]?.bancolombia || 0);
  }

  const gastosEf = g.reduce((s, x) => s + ((x.metodo||'efectivo') !== 'bancolombia' ? (x.valor||0) : 0), 0);
  const gastosBa = g.reduce((s, x) => s + (x.metodo === 'bancolombia' ? (x.valor||0) : 0), 0);
  const mercEf   = m.reduce((s, x) => s + ((x.metodo||'efectivo') !== 'bancolombia' ? (x.costo||0) : 0), 0);
  const mercBa   = m.reduce((s, x) => s + (x.metodo === 'bancolombia' ? (x.costo||0) : 0), 0);
  const fijosEf  = f.reduce((s, x) => s + ((x.metodo||'efectivo') !== 'bancolombia' ? (x.value||0) : 0), 0);
  const fijosBa  = f.reduce((s, x) => s + (x.metodo === 'bancolombia' ? (x.value||0) : 0), 0);

  const egresosEf = gastosEf + mercEf + fijosEf;
  const egresosBa = gastosBa + mercBa + fijosBa;
  const saldoEf = ventasEf - egresosEf;
  const saldoBa = ventasBa - egresosBa;

  const fmtSaldo = n => n < 0 ? `-${fmt(Math.abs(n))}` : fmt(n);

  const lineRow = (label, val) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0ead0">
    <span style="font-size:13px;color:${val > 0 ? '#4a5568' : '#aab89a'}">${label}</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:${val > 0 ? '#8b1a1a' : '#ccc'}">${val > 0 ? '-' + fmt(val) : '—'}</span>
  </div>`;

  const cajaCard = (titulo, bgHeader, colorTxt, ventas, gastos, merc, fijos, egresos, saldo) => {
    const saldoColor = saldo >= 0 ? '#2d5016' : '#8b1a1a';
    const saldoBg    = saldo >= 0 ? '#e8f2dc' : '#fce4e4';
    return `<div style="border-radius:14px;overflow:hidden;border:2px solid ${bgHeader}66">
      <div style="background:${bgHeader};padding:16px 20px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${colorTxt};opacity:.8">${titulo}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:${colorTxt};margin-top:4px">${fmt(ventas)}</div>
        <div style="font-size:11px;color:${colorTxt};opacity:.65;margin-top:2px">ingresos del mes</div>
      </div>
      <div style="background:#fefdf5;padding:14px 18px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6b7c5e;margin-bottom:8px">Egresos</div>
        ${lineRow('Gastos variables', gastos)}
        ${lineRow('Mercancía', merc)}
        ${lineRow('Gastos fijos', fijos)}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px">
          <span style="font-size:12px;font-weight:700;color:#6b1a1a;text-transform:uppercase;letter-spacing:1px">Total egresos</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#8b1a1a">${egresos > 0 ? '-' + fmt(egresos) : '—'}</span>
        </div>
        <div style="border-radius:10px;padding:14px 16px;background:${saldoBg};display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:${saldoColor}">Saldo estimado</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:${saldoColor}">${fmtSaldo(saldo)}</span>
        </div>
      </div>
    </div>`;
  };

  let html = `<h3 class="section-title">Balance de Caja — ${MONTHS[currentMonth]} ${currentYear}</h3>`;
  html += '<div class="caja-grid">';
  html += cajaCard('Efectivo', '#3a6b28', '#e8f5e0', ventasEf, gastosEf, mercEf, fijosEf, egresosEf, saldoEf);
  html += cajaCard('Bancolombia', '#154360', '#d6eaf8', ventasBa, gastosBa, mercBa, fijosBa, egresosBa, saldoBa);
  html += '</div>';

  document.getElementById("tab-caja").innerHTML = html;
}

// ============ RESUMEN ============
function renderResumen() {
  const key = getKey();
  const days = daysInMonth(currentMonth, currentYear);
  const v = data.ventas?.[key] || {};
  const g = data.gastos?.[key] || [];
  const m = data.mercancia?.[key] || [];
  const f = data.fijos?.[key] || DEFAULT_FIXED;
  
  let totE = 0, totB = 0;
  for (let d = 1; d <= days; d++) { totE += (v[d]?.efectivo||0); totB += (v[d]?.bancolombia||0); }
  const totVentas = totE + totB;
  const totGastos = g.reduce((s,x) => s+(x.valor||0), 0);
  const totMerc = m.reduce((s,x) => s+(x.costo||0), 0);
  const totFijos = f.reduce((s,x) => s+(x.value||0), 0);
  const totalEgresos = totGastos + totMerc + totFijos;
  const utilidad = totVentas - totalEgresos;
  
  let html = `<h3 class="section-title">Resumen — ${MONTHS[currentMonth]} ${currentYear}</h3>`;
  
  // Ingresos
  html += '<div style="margin-bottom:20px"><div class="sum-section-label">Ingresos</div><div class="sum-grid3">';
  html += `<div class="summary-card" style="background:#eef5e6;border:2px solid #3a5f1c22"><div class="label" style="color:#3a5f1c">Efectivo</div><div class="value" style="color:#3a5f1c">${fmt(totE)}</div></div>`;
  html += `<div class="summary-card" style="background:#e4f0f9;border:2px solid #1a527622"><div class="label" style="color:#1a5276">Bancolombia</div><div class="value" style="color:#1a5276">${fmt(totB)}</div></div>`;
  html += `<div class="summary-card" style="background:#e8f2dc;border:2px solid #2d501622"><div class="label" style="color:#2d5016">Total Ventas</div><div class="value" style="color:#2d5016">${fmt(totVentas)}</div></div>`;
  html += '</div></div>';
  
  // Egresos
  html += '<div style="margin-bottom:20px"><div class="sum-section-label">Egresos</div><div class="sum-grid4">';
  html += `<div class="summary-card" style="background:#fce8e8;border:2px solid #8b1a1a22"><div class="label" style="color:#8b1a1a">Gastos Variables</div><div class="value" style="color:#8b1a1a">${fmt(totGastos)}</div></div>`;
  html += `<div class="summary-card" style="background:#fdf1dc;border:2px solid #7a4f0e22"><div class="label" style="color:#7a4f0e">Mercancía</div><div class="value" style="color:#7a4f0e">${fmt(totMerc)}</div></div>`;
  html += `<div class="summary-card" style="background:#f5e6fa;border:2px solid #5c1a6e22"><div class="label" style="color:#5c1a6e">Gastos Fijos</div><div class="value" style="color:#5c1a6e">${fmt(totFijos)}</div></div>`;
  html += `<div class="summary-card" style="background:#fce4e4;border:2px solid #6b1a1a22"><div class="label" style="color:#6b1a1a">Total Egresos</div><div class="value" style="color:#6b1a1a">${fmt(totalEgresos)}</div></div>`;
  html += '</div></div>';
  
  // Utilidad
  const uBg = utilidad >= 0 ? "linear-gradient(135deg,#2d5016,#4a7c2e)" : "linear-gradient(135deg,#6b1a1a,#8b2a2a)";
  const uEmoji = utilidad >= 0 ? "📈" : "📉";
  const uLabel = utilidad >= 0 ? "Utilidad Neta" : "Pérdida Neta";
  html += `<div class="utilidad-bar" style="background:${uBg}">
    <div><div class="u-label">${uLabel}</div><div class="u-val">${fmt(utilidad)}</div></div>
    <div class="u-icon">${uEmoji}</div>
  </div>`;
  
  // Desglose fijos
  html += '<div style="margin-top:20px"><div class="sum-section-label">Desglose Gastos Fijos</div>';
  f.forEach(item => {
    html += `<div class="detail-row"><span class="dr-name">${item.name}</span><span class="dr-val" style="color:#5c1a6e">${fmt(item.value)}</span></div>`;
  });
  html += '</div>';
  
  // Últimas compras
  if (m.length > 0) {
    html += '<div style="margin-top:20px"><div class="sum-section-label">Últimas Compras de Mercancía</div>';
    m.slice(-5).reverse().forEach(item => {
      const prov = item.proveedor ? ` (${item.proveedor})` : "";
      html += `<div class="detail-row"><span class="dr-name"><strong>${fmtFecha(item.fecha)}</strong> — ${item.producto||"Sin nombre"}${prov}</span><span class="dr-val" style="color:#7a4f0e">${fmt(item.costo)}</span></div>`;
    });
    html += '</div>';
  }
  
  document.getElementById("tab-resumen").innerHTML = html;
}

// Init
updateMonthLabel();
initData();
</script>
